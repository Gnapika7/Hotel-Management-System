.gallery-grid {
  display: grid;
  grid-template-columns: 2fr 1fr; /* left bigger, right smaller */
  grid-template-rows: 1fr 1fr;    /* right side split into two rows */
  gap: 10px; /* spacing between images */
  max-width: 500px;
  height:400px;
  margin: 0 auto;
  
}

.left {
  grid-row: 1 / span 2; /* left image spans both rows */
}

.top {
  grid-column: 2; /* right column */
  grid-row: 1;    /* first row */
}

.bottom {
  grid-column: 2; /* right column */
  grid-row: 2;    /* second row */
}

.gallery-grid img {
  width: 100%;
  height: 100%;
  object-fit:cover; /* keeps images nicely cropped */
  border-radius: 8px; /* optional rounded corners */
}
</style>
