<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sunrise Hotel</title>
    <link rel="stylesheet" href="style.css">
    <style>
      * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
}

/* NAVBAR */
.navbar {
    width: 100%;
    height: 70px;
    background-color: rgb(26, 144, 146);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 60px;
    position: fixed;
    top: 0;
    z-index: 10;
}

.logo {
    color: white;
    font-size: 22px;
    font-weight: bold;
}

.menu {
    display: flex;
    gap: 30px;
}

.menu-item {
    color: #cccccc;
    font-size: 14px;
    cursor: pointer;
    text-decoration: none;
}

.menu-item:hover,
.menu-item.active {
    color: #f5c16c;
}

/* HERO SECTION */
.hero {
    width: 100%;
    height: 100vh;
    background-size: cover;
    background-position: center;
    position: relative;
}

/* DARK OVERLAY */
.hero::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.55);
}

/* HERO CONTENT */
.hero-content {
    position: relative;
    color: white;
    text-align: center;
    top: 50%;
    transform: translateY(-50%);
}

.hero-content h1 {
    font-size: 70px;
    letter-spacing: 10px;
    color: #f5c16c;
}

.tagline {
    font-size: 18px;
    letter-spacing: 4px;
    margin-top: 15px;
}

.subtext {
    font-size: 14px;
    margin-top: 10px;
    letter-spacing: 3px;
    opacity: 0.8;
}

/* BUTTON */
.btn {
    margin-top: 30px;
    padding: 12px 30px;
    background-color: transparent;
    border: 2px solid #f5c16c;
    color: #f5c16c;
    font-size: 14px;
    cursor: pointer;
}

.btn:hover {
    background-color: #f5c16c;
    color: black;
}
    </style>
</head>
<body >

    <!-- NAVBAR -->
    <div class="navbar">
        <div class="logo">MARRITO</div>
        <div class="menu">
            <div class="menu-item active">HOME</div>
            <div ><a href="about_us.html" target="_self" class="menu-item">ABOUT US</a></div>
            <div ><a href="branches.html" target="_self" class="menu-item">BRANCHES</a></div>
            <div ><a href="gallery.html" target="_self" class="menu-item">SERVICES</a></div>
            <div ><a href="room.html" target="_self" class="menu-item">ROOM BOOKINGS</a></div>
            <div ><a href="contact.html" target="_self" class="menu-item">CONTACT US</a></div>
        </div>
    </div>

    <!-- HERO SECTION -->
    <div class="hero" style="background-image: url('main_page.webp'); background-size:100% 280%; background-repeat: no-repeat;">
        <div class="hero-content">
            <h1>MARRITO</h1>
            <p class="tagline">WE KNOW WHAT YOU LOVE</p>
            <p class="subtext">WELCOME TO OUR HOTELS</p>
            
        </div>
    </div>

</body>
</html>
